name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: Build and publish release
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Build release binary
        run: swift build -c release -Xswiftc -warnings-as-errors

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp .build/release/copyas "dist/copyas"
          chmod +x "dist/copyas"
          (
            cd dist
            zip -X "../copyas-${VERSION}-macos-arm64.zip" copyas
          )
          shasum -a 256 "copyas-${VERSION}-macos-arm64.zip" > "copyas-${VERSION}-macos-arm64.zip.sha256"

      - name: Create GitHub release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            "copyas-${VERSION}-macos-arm64.zip" \
            "copyas-${VERSION}-macos-arm64.zip.sha256"
        env:
          GH_TOKEN: ${{ github.token }}
